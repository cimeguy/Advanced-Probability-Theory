<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>高等概率论 · 知识点(三版本)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>高等概率论</h1>
      <span class="subtitle">测度与概率 · 课程知识点</span>
    </div>
    <div class="version-switch" id="versionSwitch">
      <button data-ver="original" class="active">原版</button>
      <button data-ver="cs">CS专业版</button>
      <button data-ver="freshman">大一新生版</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <input type="search" id="search" placeholder="搜索知识点 / 概念 / 定理…" />
      <nav id="nav"></nav>
    </aside>
    <main id="content">
      <div class="placeholder">从左侧选择一个知识点开始 →</div>
    </main>
  </div>

  <!-- 简易 markdown 渲染 + KaTeX 数学渲染 -->
  <script src="data/structure.js"></script>
  <script src="data/original.js"></script>
  <script src="data/cs.js"></script>
  <script src="data/freshman.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
